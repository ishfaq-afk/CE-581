// Remove duplicate questions by exact question text before starting the exam.
const uniqueQuestions = [];
const seenQuestions = new Set();
allQuestions.forEach(q => {
  const key = q.text.trim();
  if (!seenQuestions.has(key)) {
    seenQuestions.add(key);
    uniqueQuestions.push(q);
  }
});

let currentPool = [];
let currentIndex = 0;
let round = 1;
let correctTotal = 0;
let wrongTotal = 0;
let wrongThisRound = [];
let selectedOptions = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startExam() {
  document.getElementById('welcomeArea').classList.add('hidden');
  document.getElementById('header').classList.remove('hidden');
  document.getElementById('stats').classList.remove('hidden');

  currentPool = shuffle([...uniqueQuestions]);
  currentIndex = 0;
  round = 1;
  correctTotal = 0;
  wrongTotal = 0;
  wrongThisRound = [];
  selectedOptions = [];
  updateStats();
  document.getElementById('doneArea').classList.add('hidden');
  showQuestion();
}

function resetCountersForNewRound() {
  correctTotal = 0;
  wrongTotal = 0;
}

function startNextRound() {
  currentPool = shuffle([...wrongThisRound]);
  wrongThisRound = [];
  currentIndex = 0;
  round++;
  selectedOptions = [];
  resetCountersForNewRound();
  updateStats();
  showQuestion();
}

function updateStats() {
  document.getElementById('roundNum').textContent = round;
  document.getElementById('remainCount').textContent = currentPool.length - currentIndex;
  document.getElementById('correctCount').textContent = correctTotal;
  document.getElementById('wrongCount').textContent = wrongTotal;
}

function showQuestion() {
  if (currentIndex >= currentPool.length) {
    if (wrongThisRound.length === 0) {
      document.getElementById('questionArea').innerHTML = '';
      document.getElementById('doneArea').classList.remove('hidden');
      return;
    }
    startNextRound();
    return;
  }

  const q = currentPool[currentIndex];
  const shuffledOpts = shuffle(q.options);
  selectedOptions = [];

  const isMulti = q.multi > 1;
  const selectText = isMulti ? `Select ${q.multi} answers` : 'Select one answer';

  let html = `
    <div class="bg-slate-800 rounded-2xl p-6 border border-slate-700">
      <div class="flex items-center gap-2 mb-3">
        <span class="text-xs font-semibold uppercase tracking-wide text-slate-400">Question ${currentIndex + 1} of ${currentPool.length}</span>
        <span class="ml-auto text-xs bg-slate-700 px-2 py-0.5 rounded-full text-slate-300">${selectText}</span>
      </div>
      <p class="text-lg font-medium mb-6 leading-relaxed">${q.text}</p>
      <div id="optionsContainer" class="space-y-3">
  `;

  shuffledOpts.forEach(opt => {
    html += `<button class="option-btn w-full text-left px-5 py-4 rounded-xl border-2 border-slate-600 bg-slate-750 hover:border-slate-400 font-medium" data-id="${opt.id}">
      ${opt.text}
    </button>`;
  });

  html += `</div>`;

  if (isMulti) {
    html += `<button id="submitMulti" class="mt-5 bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg font-semibold transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>Submit Answer</button>`;
  }

  html += `<div id="feedback" class="mt-4 hidden"></div>
      <button id="nextBtn" class="mt-4 hidden bg-slate-700 hover:bg-slate-600 px-5 py-2.5 rounded-lg font-medium transition">Next →</button>
    </div>`;

  document.getElementById('questionArea').innerHTML = html;
  updateStats();

  const buttons = document.querySelectorAll('.option-btn');

  if (!isMulti) {
    buttons.forEach(btn => {
      btn.addEventListener('click', () => handleSingleSelect(btn, q, buttons));
    });
  } else {
    buttons.forEach(btn => {
      btn.addEventListener('click', () => handleMultiToggle(btn, q));
    });
    document.getElementById('submitMulti').addEventListener('click', () => handleMultiSubmit(q, buttons));
  }

  document.getElementById('nextBtn').addEventListener('click', () => {
    currentIndex++;
    showQuestion();
  });
}

function handleSingleSelect(btn, q, buttons) {
  buttons.forEach(b => b.disabled = true);
  const chosen = btn.dataset.id;
  const isCorrect = q.answers.includes(chosen);

  // Mark your selection
  btn.classList.add(isCorrect ? 'correct' : 'incorrect');
  btn.classList.remove('selected-opt');
  
  // Show all correct answers in green
  buttons.forEach(b => { 
    if (q.answers.includes(b.dataset.id) && b !== btn) {
      b.classList.add('correct');
      b.classList.remove('selected-opt');
    }
  });

  if (isCorrect) {
    correctTotal++;
    showFeedback(true);
  } else {
    wrongTotal++;
    wrongThisRound.push(q);
    showFeedback(false);
  }
  document.getElementById('nextBtn').classList.remove('hidden');
  updateStats();
}

function handleMultiToggle(btn, q) {
  const id = btn.dataset.id;
  if (selectedOptions.includes(id)) {
    selectedOptions = selectedOptions.filter(x => x !== id);
    btn.classList.remove('selected-opt');
  } else {
    if (selectedOptions.length < q.multi) {
      selectedOptions.push(id);
      btn.classList.add('selected-opt');
    }
  }
  const submitBtn = document.getElementById('submitMulti');
  submitBtn.disabled = selectedOptions.length !== q.multi;
}

function handleMultiSubmit(q, buttons) {
  buttons.forEach(b => b.disabled = true);
  document.getElementById('submitMulti').classList.add('hidden');

  const isCorrect = q.answers.length === selectedOptions.length && q.answers.every(a => selectedOptions.includes(a));

  buttons.forEach(b => {
    if (q.answers.includes(b.dataset.id)) {
      b.classList.add('correct');
      b.classList.remove('selected-opt');
    }
    else if (selectedOptions.includes(b.dataset.id)) {
      b.classList.add('incorrect');
      b.classList.remove('selected-opt');
    }
  });

  if (isCorrect) {
    correctTotal++;
    showFeedback(true);
  } else {
    wrongTotal++;
    wrongThisRound.push(q);
    showFeedback(false);
  }
  document.getElementById('nextBtn').classList.remove('hidden');
  updateStats();
}

function showFeedback(correct) {
  const fb = document.getElementById('feedback');
  fb.classList.remove('hidden');
  fb.innerHTML = correct
    ? '<span class="text-emerald-400 font-semibold">✓ Correct!</span>'
    : '<span class="text-red-400 font-semibold">✗ Incorrect — correct answer highlighted in green</span>';
}
